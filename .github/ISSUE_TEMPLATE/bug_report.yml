name: Bug report
description: A rule misfires, crashes, or behaves wrong
labels: [bug]
body:
  - type: textarea
    id: snippet
    attributes:
      label: Minimal definition snippet
      description: The smallest agent/command/skill markdown that reproduces it.
      render: markdown
    validations:
      required: true
  - type: input
    id: rule
    attributes:
      label: Rule code
      placeholder: e.g. AL300
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What did you expect, and what did agent-lint do?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: agent-lint version
      placeholder: "agent-lint --version"
