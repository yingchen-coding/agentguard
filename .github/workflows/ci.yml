name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -q

  self-lint:
    # agent-lint lints its own example definitions and runs its own supply-chain check — dogfooding.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - run: agent-lint --format sarif -o agent-lint.sarif examples || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: agent-lint.sarif
        continue-on-error: true
      # Supply-chain self-scan: the repo must be free of committed secrets and malware signatures.
      # (--select limits the gate to the security-critical AL5xx checks; placeholders won't fail it.)
      - run: agent-lint . --publish-check --select AL503,AL510,AL511,AL512,AL513 --fail-at major
