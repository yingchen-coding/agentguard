[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "agent-lint"
version = "0.1.0"
description = "ESLint for AI agents — a deterministic linter for agent, command, and skill definitions."
readme = "README.md"
license = { text = "MIT" }
authors = [{ name = "Ying Chen" }]
requires-python = ">=3.9"
keywords = ["claude-code", "agents", "llm", "linter", "prompt-engineering", "ci", "agent-reliability"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Quality Assurance",
]
dependencies = []

[project.urls]
Homepage = "https://github.com/YOUR_USERNAME/agent-lint"
Issues = "https://github.com/YOUR_USERNAME/agent-lint/issues"

[project.scripts]
agent-lint = "agent_lint.cli:main"

[project.optional-dependencies]
dev = ["pytest>=7"]

[tool.setuptools]
packages = ["agent_lint"]

[tool.pytest.ini_options]
testpaths = ["tests"]
