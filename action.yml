name: "agentguard"
description: "Lint AI agent / command / skill definitions for the failure patterns that make agents misbehave."
author: "Ying Chen"
branding:
  icon: "check-circle"
  color: "purple"

inputs:
  path:
    description: "File or directory to lint"
    required: false
    default: "."
  fail-at:
    description: "Minimum severity that fails the run (info|minor|major|critical)"
    required: false
    default: "major"
  args:
    description: "Extra space-separated arguments passed to agentguard"
    required: false
    default: ""
  upload-sarif:
    description: "Also emit agentguard.sarif (upload it yourself with codeql-action/upload-sarif)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - shell: bash
      env:
        AGENTGUARD_ACTION_PATH: ${{ github.action_path }}
      run: python -m pip install --quiet "$AGENTGUARD_ACTION_PATH"
    - shell: bash
      env:
        AGENTGUARD_ARGS: ${{ inputs.args }}
        AGENTGUARD_FAIL_AT: ${{ inputs.fail-at }}
        AGENTGUARD_PATH: ${{ inputs.path }}
        AGENTGUARD_UPLOAD_SARIF: ${{ inputs.upload-sarif }}
      run: |
        read -r -a extra_args <<< "$AGENTGUARD_ARGS"
        if [ "$AGENTGUARD_UPLOAD_SARIF" = "true" ]; then
          agentguard --format sarif -o agentguard.sarif "${extra_args[@]}" "$AGENTGUARD_PATH" || true
        fi
        agentguard --fail-at "$AGENTGUARD_FAIL_AT" "${extra_args[@]}" "$AGENTGUARD_PATH"
